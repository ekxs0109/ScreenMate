# Same-machine local smoke-test profile only.
# If TURN_AUTH_SECRET or TURN_REALM changes in the worker env, update these to match.
# Docker Desktop or multi-device testing may require listening-ip, relay-ip,
# and external-ip values that point at a reachable host address.
listening-port=3478
no-tls
no-dtls
fingerprint
stale-nonce
use-auth-secret
static-auth-secret=screenmate-local-turn-secret
realm=screenmate.local
no-cli
min-port=49160
max-port=49200
log-file=stdout
simple-log
