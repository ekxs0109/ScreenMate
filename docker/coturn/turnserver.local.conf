# Same-machine local smoke-test profile only.
# If TURN_AUTH_SECRET or TURN_REALM changes in the worker env, update these to match.
# Docker Desktop or multi-device testing may require updating loopback-only
# compose port publishing plus listening-ip, relay-ip, and external-ip.
listening-port=3478
no-tcp
no-tls
no-dtls
no-tcp-relay
fingerprint
stale-nonce
use-auth-secret
static-auth-secret=screenmate-local-turn-secret
realm=screenmate.local
no-cli
min-port=49160
max-port=49200
log-file=stdout
simple-log
